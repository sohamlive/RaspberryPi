# ============================================================
# Homepage - services.yaml
# ============================================================
# NOTE: Pi-hole widget key = your Pi-hole web password
# Get an app password from:
# Pi-hole admin → Settings → Web interface/API → Expert mode → Configure app password
# ============================================================

- Network:
    - ISP Router:
        href: http://192.168.1.1
        description: Main ISP Gateway
        icon: router.png
        ping: 192.168.1.1
    - TP-Link Router:
        href: http://192.168.1.3
        description: Personal Router (AP Mode)
        icon: tp-link.png
        ping: 192.168.1.3
    - Pi-hole:
        href: http://pihole.lab/admin
        description: DNS & Ad Blocking
        icon: pi-hole.png
        widget:
          type: pihole
          url: http://192.168.1.2:8053
          version: 6
          key: YOUR_PIHOLE_PASSWORD_HERE  # your Pi-hole web password or app password

- Home Lab:
    - Portainer:
        href: http://portainer.lab
        description: Docker Management
        icon: portainer.png
    - Nginx Proxy Manager:
        href: http://proxy.lab
        description: Reverse Proxy & Local Hosts
        icon: nginx-proxy-manager.png
    - Uptime Kuma:
        href: http://uptime.lab
        description: Uptime Monitoring
        icon: uptime-kuma.png
    - Dozzle:
        href: http://logs.lab
        description: Container Log Viewer
        icon: docker.png
    - Netdata:
        href: http://stats.lab
        description: System Stats & Performance
        icon: netdata.png
